# ✦ Gehenna — hyprland.conf
# ───────────────────────────

################
### MONITORS ###
################

# Dell 1080p — LEFT
monitor=HDMI-A-1,1920x1080@60,0x0,1

# Acer 1440p — CENTER (main)
monitor=DP-1,2560x1440@170,1920x0,1

# Elgato Capture — RIGHT (disabled)
# monitor=DP-3,1920x1080@60,4480x0,1

####################
### WORKSPACES ###
####################

workspace=1,monitor:DP-1,default:true
workspace=2,monitor:HDMI-A-1,persistent:true
# workspace=3,monitor:DP-3,persistent:true

###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$fileManager = dolphin
$menu        = hyprlauncher

#################
### AUTOSTART ###
#################

exec-once = $terminal
exec-once = waybar
exec-once = swww-daemon
exec-once = swww img ~/Pictures/Wallpapers/wallpaper.jpg
exec-once = xwaylandvideobridge
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = __NV_DISABLE_EXPLICIT_SYNC,1
env = WLR_NO_HARDWARE_CURSORS,1
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 6
    gaps_out = 14

    border_size = 2

    col.active_border   = rgba(190,220,255,0.9)
    col.inactive_border = rgba(60,70,90,0.6)

    resize_on_border = false
    allow_tearing    = false

    layout = dwindle
}

decoration {
    rounding = 14
}

# Ethereal animation profile
animations {
    enabled = yes

    bezier = easeOut, 0.16, 1, 0.3, 1
    bezier = smooth,  0.4,  0.0, 0.2, 1.0

    animation = windows,    1, 6, easeOut
    animation = windowsOut, 1, 4, smooth
    animation = border,     1, 6, smooth
    animation = fade,       1, 4, smooth
    animation = workspaces, 1, 7, easeOut
}

dwindle {
    pseudotile    = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    animate_manual_resizes      = true
    animate_mouse_windowdragging = true
    disable_hyprland_logo       = true
    disable_splash_rendering    = true
}

#############
### INPUT ###
#############

input {
    kb_layout  = us
    kb_variant =
    kb_model   =
    kb_options =
    kb_rules   =

    follow_mouse = 1

    accel_profile = flat
    sensitivity   = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name          = logitech-g-pro--1
    accel_profile = flat
    sensitivity   = 0
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod,       Q, exec, $terminal
bind = $mainMod,       C, killactive,
bind = $mainMod,       M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod,       E, exec, $fileManager
bind = $mainMod,       V, togglefloating,
bind = $mainMod,       R, exec, $menu
bind = $mainMod SHIFT, P, pseudo,
bind = $mainMod,       J, togglesplit,
bind = ALT,            F, exec, firefox
bind = $mainMod SHIFT, S, exec, grimblast copy area

bind = $mainMod, T, alterzorder, top
bind = $mainMod, B, alterzorder, bottom
bind = $mainMod, P, pin

bind = ALT,       Tab, cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev

bind = $mainMod,       F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1

bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod,       TAB, togglespecialworkspace, magic
bind = $mainMod SHIFT, TAB, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = ,XF86AudioNext,  exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay,  exec, playerctl play-pause
bindl = ,XF86AudioPrev,  exec, playerctl previous

bind = CTRL ALT, T,      exec, kitty
bind = SUPER,   RETURN,  exec, kitty

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name        = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name            = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false
    no_focus = true
}

windowrule {
    name        = move-hyprland-run
    match:class = hyprland-run
    move  = 20 monitor_h-120
    float = yes
}

windowrule {
    name        = ninjabrain-pin
    match:class = ^ninjabrainbot-Main$
    float = true
    pin   = true
}

windowrule {
    name        = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge
    no_initial_focus = true
    no_focus         = true
    no_anim          = true
    no_blur          = true
    max_size         = 1 1
    opacity          = 0.0
}
